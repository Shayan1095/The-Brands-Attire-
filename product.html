<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" href="favicon.png" />
<title>The Brands Attire — Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
<link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<div id="site-nav"></div>
<div id="site-search"></div>

<!-- breadcrumb + PDP injected by JS -->
<div class="wrap" id="pdpHost" style="padding-top:var(--s-5);"></div>

<!-- recommendations injected by JS -->
<section class="reco" id="recoHost" style="display:none;">
  <div class="wrap">
    <div class="section__head reveal">
      <div>
        <span class="eyebrow">You may also like</span>
        <h2>Complete the look</h2>
      </div>
    </div>
    <div class="reveal"><div class="rail" id="recoRail"></div></div>
  </div>
</section>

<div id="site-footer"></div>
<div id="site-drawer"></div>

<script src="shared.js"></script>
<script>
  initPage("");

  const params = new URLSearchParams(location.search);
  const id = +params.get("id");
  const p = PRODUCTS.find(x=>x.id===id) || PRODUCTS[0];

  let selectedSize = null;
  let qty = 1;
  let activeImg = 0;

  /* ---------- BREADCRUMB + PDP ---------- */
  document.getElementById("pdpHost").innerHTML = `
    <div class="breadcrumb" style="font-family:var(--font-mono); font-size:var(--t-xs); letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:var(--s-5);">
      <a href="index.html" style="color:var(--muted);">Home</a> /
      <a href="products.html" style="color:var(--muted);">Products</a> /
      <a href="products.html?filter=${p.world}" style="color:var(--muted);">${p.world}</a> /
      <span style="color:var(--ink);">${p.name}</span>
    </div>

    <div class="pdp">
      <!-- GALLERY -->
      <div class="pdp__gallery">
        <div class="pdp__main"><img id="mainImg" src="${p.images[0]}" alt="${p.name}"/></div>
        <div class="pdp__thumbs" id="thumbs">
          ${p.images.map((src,i)=>`            <button class="pdp__thumb ${i===0?'active':''}" data-i="${i}"><img src="${src}" alt=""/></button>
          `).join("")}
        </div>
      </div>

      <!-- INFO -->
      <div class="pdp__info">
        <div class="pdp__cat">${p.world}${p.tag?` · ${p.tag}`:""}</div>
        <h1 class="pdp__name">${p.name}</h1>
        <div class="pdp__price">
          <span class="now ${p.was?'sale':''}">${money(p.price)}</span>
          ${p.was?`<span class="was">${money(p.was)}</span>`:""}
        </div>
        <p class="pdp__desc">${p.desc}</p>

        <div class="pdp__divider"></div>

        <!-- SIZES -->
        <div class="pdp__label">
          <span class="lbl">Select size</span>
          <span class="guide" id="sizeGuideBtn">Size guide</span>
        </div>
        <div class="sizes" id="sizes">
          ${p.sizes.map(s=>{
            const dis = p.soldout.includes(s);
            return `<button class="size ${dis?'disabled':''}" data-size="${s}" ${dis?'disabled':''}>${s}</button>`;
          }).join("")}
        </div>

        <!-- QTY + ACTIONS -->
        <div class="pdp__actions">
          <div class="qty">
            <button id="qtyMinus" aria-label="Decrease">−</button>
            <span id="qtyVal">1</span>
            <button id="qtyPlus" aria-label="Increase">+</button>
          </div>
          <button class="btn" id="addBtn">Add to bag <span class="arrow">→</span></button>
          <button class="wish-btn" id="wishBtn" aria-label="Wishlist">♡</button>
        </div>

        <!-- ACCORDIONS -->
        <div class="acc" id="acc1">
          <button class="acc__head">Description <span class="pm">+</span></button>
          <div class="acc__body"><div class="acc__body-inner">${p.desc}</div></div>
        </div>
        <div class="acc" id="acc2">
          <button class="acc__head">Fabric & care <span class="pm">+</span></button>
          <div class="acc__body"><div class="acc__body-inner">
            <ul>
              <li><strong>Fabric:</strong> ${p.fabric}</li>
              <li><strong>Care:</strong> ${p.care}</li>
              <li><strong>Origin:</strong> ${p.origin}</li>
            </ul>
          </div></div>
        </div>
        <div class="acc" id="acc3">
          <button class="acc__head">Shipping & returns <span class="pm">+</span></button>
          <div class="acc__body"><div class="acc__body-inner">
            Free express shipping on orders over $200. Standard delivery 3–5 business days. Returns accepted within 30 days, unworn with tags attached. Final sale items are non-returnable.
          </div></div>
        </div>
      </div>
    </div>
  `;

  /* ---------- SIZE GUIDE MODAL ---------- */
  const modal = document.createElement("div");
  modal.className = "modal";
  modal.id = "sizeModal";
  modal.innerHTML = `
    <div class="modal__box">
      <div class="modal__head">
        <h3>Size guide</h3>
        <button class="modal__close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <table class="size-table">
        <thead><tr><th>Size</th><th>Chest (in)</th><th>Waist (in)</th><th>Hip (in)</th></tr></thead>
        <tbody>
          <tr><td>XS</td><td>32–34</td><td>26–28</td><td>34–36</td></tr>
          <tr><td>S</td><td>35–37</td><td>29–31</td><td>37–39</td></tr>
          <tr><td>M</td><td>38–40</td><td>32–34</td><td>40–42</td></tr>
          <tr><td>L</td><td>41–43</td><td>35–37</td><td>43–45</td></tr>
          <tr><td>XL</td><td>44–46</td><td>38–40</td><td>46–48</td></tr>
          <tr><td>XXL</td><td>47–49</td><td>41–43</td><td>49–51</td></tr>
        </tbody>
      </table>
      <p class="modal__note">For denim & trousers, the size number refers to waist measurement in inches. Between sizes? Size down for a fitted look, up for relaxed.</p>
    </div>
  `;
  document.body.appendChild(modal);

  /* ---------- RECOMMENDATIONS ---------- */
  const recos = PRODUCTS.filter(x => x.id !== p.id && x.world === p.world).slice(0,4);
  if(recos.length){
    document.getElementById("recoHost").style.display = "";
    document.getElementById("recoRail").innerHTML = recos.map(cardHTML).join("");
  }

  /* ---------- INTERACTIONS ---------- */
  // gallery thumbnails - crossfade
  document.getElementById("thumbs").addEventListener("click", e=>{
    const t = e.target.closest("[data-i]");
    if(!t) return;
    activeImg = +t.dataset.i;
    const mainImg = document.getElementById("mainImg");
    mainImg.style.opacity = 0;
    setTimeout(()=>{
      mainImg.src = p.images[activeImg];
      mainImg.style.opacity = 1;
    }, 320);
    document.querySelectorAll(".pdp__thumb").forEach(th=>th.classList.toggle("active", th===t));
  });

  // size selection
  document.getElementById("sizes").addEventListener("click", e=>{
    const s = e.target.closest(".size:not(.disabled)");
    if(!s) return;
    selectedSize = s.dataset.size;
    document.querySelectorAll(".size").forEach(x=>x.classList.remove("active"));
    s.classList.add("active");
  });

  // qty
  function setQty(n){ qty = Math.max(1, Math.min(10, n)); document.getElementById("qtyVal").textContent = qty; }
  document.getElementById("qtyMinus").addEventListener("click", ()=> setQty(qty-1));
  document.getElementById("qtyPlus").addEventListener("click", ()=> setQty(qty+1));

  // add to bag
  document.getElementById("addBtn").addEventListener("click", ()=>{
    if(!selectedSize){
      toast("Please select a size");
      return;
    }
    for(let i=0;i<qty;i++) addToCart(p.id, selectedSize);
  });

  // wishlist
  const wishBtn = document.getElementById("wishBtn");
  wishBtn.addEventListener("click", ()=>{
    wishBtn.classList.toggle("active");
    wishBtn.textContent = wishBtn.classList.contains("active") ? "♥" : "♡";
    toast(wishBtn.classList.contains("active") ? "Added to wishlist" : "Removed from wishlist");
  });

  // accordions
  document.querySelectorAll(".acc__head").forEach(h=>{
    h.addEventListener("click", ()=> h.parentElement.classList.toggle("open"));
  });

  // size guide modal
  document.getElementById("sizeGuideBtn").addEventListener("click", ()=>{
    document.getElementById("sizeModal").classList.add("open");
  });
  document.getElementById("modalClose").addEventListener("click", ()=>{
    document.getElementById("sizeModal").classList.remove("open");
  });
  document.getElementById("sizeModal").addEventListener("click", e=>{
    if(e.target.id === "sizeModal") e.currentTarget.classList.remove("open");
  });

  // re-observe reveal on the new reco section
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
  }, { threshold:.12 });
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script>
</body>
</html>
